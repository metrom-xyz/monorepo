type Token @entity(immutable: true) {
    id: Bytes!
    name: String!
    symbol: String!
    decimals: Int!
}

type Pool @entity(immutable: false) {
    id: Bytes!
    token0: Token!
    token1: Token!
    token0Tvl: BigInt!
    token1Tvl: BigInt!
    tick: Int!
    price: BigDecimal!
    sqrtPriceX96: BigInt!
    fee: Int!
    liquidity: BigInt!
}

type Position @entity(immutable: false) {
    id: Bytes!
    owner: Bytes!
    lowerTick: Int!
    upperTick: Int!
    liquidity: BigInt!
    direct: Boolean!
    pool: Pool!
}

type Tick @entity(immutable: false) {
    id: Bytes!
    idx: Int!
    pool: Pool!
    liquidityGross: BigInt!
    liquidityNet: BigInt!
}

type _NftMint @entity(immutable: true) {
    id: Bytes!
    owner: Bytes!
}
