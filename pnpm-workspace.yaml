packages:
  - packages/*
  - subgraphs/*

allowBuilds:
  "@parcel/watcher": false
  "@reown/appkit": false
  "@swc/core": false
  bufferutil: false
  esbuild: false
  keccak: false
  protobufjs: false
  secp256k1: false
  sharp: false
  unrs-resolver: false
  utf-8-validate: false
  workerd: false

minimumReleaseAge: 5760 # 7 days in minutes
minimumReleaseAgeExclude:
  - "@metrom-xyz/contracts"
  - "@metrom-xyz/aptos-contracts"
  - "@metrom-xyz/programs-solana"
blockExoticSubdeps: true
